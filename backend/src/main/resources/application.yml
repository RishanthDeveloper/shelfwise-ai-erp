spring:
  application:
    name: shelfwise-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shelfwise}
    username: ${SPRING_DATASOURCE_USERNAME:shelfwise}
    password: ${SPRING_DATASOURCE_PASSWORD:shelfwise123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

server:
  port: 8080

# Python ML microservice URL
shelfwise:
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8000}

# Actuator health
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

# Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.shelfwise: INFO
    org.hibernate.SQL: WARN
