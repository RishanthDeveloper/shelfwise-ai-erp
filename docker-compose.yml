version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shelfwise-postgres
    environment:
      POSTGRES_DB: shelfwise
      POSTGRES_USER: shelfwise
      POSTGRES_PASSWORD: shelfwise
    ports:
      - "5432:5432"
    volumes:
      - shelfwise_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelfwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  ml-service:
    build: ./ml-service
    container_name: shelfwise-ml-service
    ports:
      - "8000:8000"

  backend:
    build: ./backend-java
    container_name: shelfwise-backend
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shelfwise
      DB_USER: shelfwise
      DB_PASSWORD: shelfwise
      ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "8080:8080"

volumes:
  shelfwise_pg_data:
