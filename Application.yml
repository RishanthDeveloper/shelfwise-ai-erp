server:
  port: 8080

spring:
  application:
    name: shelfwise-erp-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shelfwise}
    username: ${DB_USER:shelfwise}
    password: ${DB_PASSWORD:shelfwise}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  sql:
    init:
      mode: always
      continue-on-error: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Base URL of the Python ML microservice (models: expiry-risk, demand, discount DQN, fraud, B2B NMF)
ml:
  service:
    base-url: ${ML_SERVICE_URL:http://localhost:8000}
    timeout-ms: 4000

logging:
  level:
    com.shelfwise: INFO
